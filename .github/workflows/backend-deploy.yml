name: backend-deploy
on:
  push:
    branches: [ "develop" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
      - "docker-compose.yml"

permissions:
  contents: read
  packages: write

env:
  DEPLOY_PATH: /home/user/apps/disaster
  IMAGE_NAME: ghcr.io/${{ github.repository }}/backend
  IMAGE_TAG: latest


jobs:
  backend-build-and-push:
    runs-on: [ self-hosted, Linux, ARM64 ]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f backend/Dockerfile backend
      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  backend-deploy-on-pi:
    runs-on: [self-hosted, Linux, ARM64]
    needs: backend-build-and-push
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull & Recreate only backend
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          docker compose pull backend
          docker compose up -d --force-recreate --no-deps backend

      - name: Cleanup dangling images (optional)
        run: docker image prune -f || true
