name: backend-deploy

on:
  push:
    branches: [ "develop" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
      - "deploy/**"
      - "docker-compose.yml"

env:
  IMAGE_NAME: disaster-backend
  DEPLOY_PATH: /home/user/apps/disaster

jobs:
  deploy-on-pi:
    runs-on: [ self-hosted, Linux, ARM64 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image on Pi (single arch, arm64)
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./backend
      - name: Compose up (no pull)
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          docker compose up -d --remove-orphans
      - name: Cleanup dangling images (optional)
        run: docker image prune -f || true
