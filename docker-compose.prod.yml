services:
  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: disaster-backend
    image: ${DOCKER_USER}/disaster-backend:${API_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod


  db:
    image: postgres:16
    container_name: disaster-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: disaster-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
