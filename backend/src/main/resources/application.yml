#도커용
spring:
  application:
    name: "backend"
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    #    org.springframework.beans.factory: debug
    #    org.hibernate.SQL: debug
    com.disaster.alert: info
    org.springframework.web: debug

server:
  port: 8080

cookie:
  secure: false

disaster-alert:
  api:
    service-key: ${DISASTER_ALERT_SERVICE_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 20 # in seconds
  refresh-token-expiration: 604800 # in seconds
  header: Authorization
  prefix: Bearer

oauth:
  success-redirect: ${OAUTH_SUCCESS_REDIRECT:https://www.disaster-alert-archive.co.kr/dashboard}
  google:
    clientId: ${GOOGLE_OAUTH_CLIENT_ID}
    clientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    redirectUri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/google/callback}
  kakao:
    clientId: ${KAKAO_OAUTH_CLIENT_ID}
    clientSecret: ${KAKAO_OAUTH_CLIENT_SECRET}
    redirectUri: ${KAKAO_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/kakao/callback}
  naver:
    clientId: ${NAVER_OAUTH_CLIENT_ID}
    clientSecret: ${NAVER_OAUTH_CLIENT_SECRET}
    redirectUri: ${NAVER_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/naver/callback}


springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs