#도커용
spring:
  application:
    name: "backend"
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
        id:
          new_generator_mappings: true  # 추가
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    baseline-on-migrate: true   # 기존 데이터가 있는 DB에 처음 붙을 때 충돌 방지
    baseline-version: 0         # 기준 버전 (0으로 두면 V1부터 신규 실행)
    out-of-order: true          # 순서가 어긋난 미적용 마이그레이션 허용
    locations: classpath:db/migration
    encoding: UTF-8

logging:
  level:
    #    org.springframework.beans.factory: debug
    #    org.hibernate.SQL: debug
    com.disaster.alert: info
    org.springframework.web: debug

server:
  port: 8080

cookie:
  secure: false
  domain: ${COOKIE_DOMAIN:}  # 로컬은 비워둠, 운영은 env로 주입


disaster-alert:
  api:
    service-key: ${DISASTER_ALERT_SERVICE_KEY}

# 기상청 초단기실황 API (공공데이터포털 게이트웨이)
# - 매시 정각 관측값을 매시 40분에 발표 → 스케줄러가 매시 45분에 호출
kma:
  api:
    base-url: https://apis.data.go.kr/1360000
    service-key: ${KMA_ASOS_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600 # in seconds
  refresh-token-expiration: 604800 # in seconds
  header: Authorization
  prefix: Bearer

oauth:
  success-redirect: ${OAUTH_SUCCESS_REDIRECT:https://www.disaster-alert-archive.co.kr/dashboard}
  google:
    clientId: ${GOOGLE_OAUTH_CLIENT_ID}
    clientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    redirectUri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/google/callback}
  kakao:
    clientId: ${KAKAO_OAUTH_CLIENT_ID}
    clientSecret: ${KAKAO_OAUTH_CLIENT_SECRET}
    redirectUri: ${KAKAO_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/kakao/callback}
  naver:
    clientId: ${NAVER_OAUTH_CLIENT_ID}
    clientSecret: ${NAVER_OAUTH_CLIENT_SECRET}
    redirectUri: ${NAVER_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/naver/callback}


deepl:
  api-key: ${DEEPL_API_KEY}
  api-url: https://api-free.deepl.com/v2/translate
  enabled: true

# Spring AI — OpenAI Embedding + Chat
# 컨테이너 추가 없음. 기존 backend Spring Boot 프로세스 안에서 라이브러리로 동작.
# base-url 은 embedding/chat 공용 — SSAFY GMS 프록시 토큰 사용(팀 risk 모듈과 공유).
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:dummy}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    embedding:
      options:
        model: text-embedding-3-small
        dimensions: 1536
    # chat 모델 공용 — risk 모듈 LlmRiskProfiler(35종에 없는 신규 유형 프로파일) + 이벤트 cross-region 같은 사건 판정
    chat:
      options:
        model: gpt-4o-mini
        temperature: 0.2

# 이벤트 클러스터링 (임베딩 기반)
# 지역 hard 필터: 같은 시군구 후보만, 코사인 유사도 >= similarity-threshold 면 머지.
# (cross-region 자동병합은 폭염 등 템플릿형 메시지에서 다지역 blob 을 만들어 제거 — 실데이터 검증)
clustering:
  enabled: ${CLUSTERING_ENABLED:false}
  similarity-threshold: 0.85
  candidate-time-window-hours: 168
  # 한 알림이 이 수 초과 시군구에 발송되면 광역 브로드캐스트로 보고 단독 이벤트 처리 (blob 다리 차단)
  max-region-span: 10
  # 광역 알림이 이 수 이상 시도에 걸치면 '전국' 이벤트로 분류 (유형만 키, 라벨 "전국 {유형}").
  # 미만이면 시도 광역(최다 시군구 시도 + 유형 키). 전국 17개 시도 기준, 영남권(~5)·수도권(~3) 같은
  # 권역 클러스터는 시도 광역으로 남기고 행안부 전국 안내(17시도) 류만 전국으로 빼는 값.
  nationwide-sido-span: 8
  # 실종 인물 신원 클러스터링 윈도우 — 같은 이름+나이+키를 한 사람으로 보는 재신고 간격 (14일).
  # 인물은 임베딩/지역이 아니라 신원으로만 묶음(같은 사람=한 이벤트, 다른 사람=다른 이벤트).
  person-window-hours: 336
  # 지역앵커 유형(유형:윈도우시간 CSV) — 산불·산사태·홍수처럼 "유형+시군구가 곧 사건"인 이산 재난을
  # 같은 시군구·같은 유형·윈도우 안에서 임베딩/LLM 무관하게 하나로 묶음(태풍 global-types 와 같은 철학,
  # 단 전국이 아니라 시군구 스코프 → 전국 blob 방지). 한 산불/호우 episode 가 본문 텍스트 차이(코사인<0.85)로
  # 수십 개로 파편화되던 것을 차단(산청 산불 16조각 등). 윈도우는 유형별: 산불은 재발화 주기가 길어 14일(336h),
  # 호우성(산사태·홍수)은 같은 날 burst 라 7일(168h). ⚠️ 계절 연속형(폭염·호우특보·한파·대설)은 절대 넣지 말 것
  # — 같은 시군구 매일 발령이라 윈도우로 체인돼 span>180 blob 부활.
  regional-types: "산불:336,산사태:168,홍수:168"
  # local borderline LLM 폴백 — 같은 시군구 후보지만 임베딩이 임계(0.85) 미만이라 못 묶은
  # '사고성' 사건을 LLM 으로 동일 사건 판정해 묶는다. "서소문 고가 붕괴"처럼 같은 사고를 여러
  # 기관이 다른 측면(도로통제/KTX/경의선)으로 보내 본문 임베딩이 갈리는 케이스 대응.
  # 폭염·호우 등 기상특보는 발효/해제 반복이 borderline 에 걸려 LLM 이 과병합하므로 화이트리스트로 제외.
  # recluster 시에도 enabled=true 면 동작(임베딩 임계 튜닝만 할 땐 false 로 두면 LLM 호출 0=공짜).
  llm-fallback:
    enabled: ${LLM_FALLBACK_ENABLED:false}   # 실시간/백필 공용 토글 (clustering.enabled 와 별개)
    distance-ceil: 0.40                        # (mergeMaxDistance=0.15, 0.40] 구간 후보만 LLM 에 질의
    # 특정 장소·시설의 일회성 사고만 (실데이터 borderline 분석 기반). 기타는 동물·실종 게이트로 추가 제외.
    accident-types: "기타,화재,산불,붕괴,교통사고,교통통제,교통,환경오염사고,정전,통신,테러,지진,지진해일,수도"
  # cross-region LLM 병합 — 지역 이동 사건(탈출 동물 등 비정형)을 LLM 으로 같은 사건 판정해 묶음.
  # clusterNewAlert(local+broadcast)와 분리된 별도 단계라 recluster(공짜 튜닝)에 LLM 안 섞임.
  cross-region:
    enabled: ${CROSS_REGION_ENABLED:false}   # 실시간 토글 (clustering.enabled 와 별개)
    candidate-window-hours: 336               # 14일 (실종·이동은 며칠~몇 주)
    top-k: 5                                  # 임베딩 후보 상위 K (LLM 에 배치로 전달)
    similarity-floor: 0.6                     # 무관한 기타 거름용 (동일인 판정은 LLM 몫)
    span-cap-alerts: 30                       # cross-region 이벤트 최대 알림 수 (blob 방지)
    span-cap-sido: 10                         # 최대 걸친 시도 수
    mover-keywords: "찾습니다|실종|수배|가출|배회|탈출|출몰|멧돼지|들개|늑대"   # 게이트(전체 이동신호)
    animal-keywords: "탈출|출몰|멧돼지|들개|늑대"   # 인물(이름+나이) 아닌 동물·비정형만 임베딩+LLM

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs